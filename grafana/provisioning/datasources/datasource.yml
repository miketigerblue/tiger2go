apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    uid: pg
    type: postgres
    access: proxy
    url: db:5432
    user: user
    jsonData:
      database: tiger2go
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 3600
    secureJsonData:
      password: pass
    editable: false
